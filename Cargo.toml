cargo-features = ["codegen-backend"]
[package]
name = "social_networks"
version = "0.3.4"
edition = "2024"
authors = ["Valeriy Sakharov <valeratrades@gmail.com>"]
description = "my utils for social networks managing/monitoring"
readme = "README.md"
license = "BlueOak-1.0.0"
repository = "https://github.com/valeratrades/social_networks"

[package.metadata.docs.rs]
cargo-args = ["-Zunstable-options", "-Zrustdoc-scrape-examples"]

[package.metadata.binstall]
pkg-url = "{ repo }/releases/download/v{ version }/{ name }-{ target }.tar.gz"
bin-dir = "{ bin }{ binary-ext }"
pkg-fmt = "tgz"

[dependencies]
ask_llm = "=2.2.2"
base64 = "=0.22.1"
clap = { version = "=4.6.1", features = ["derive"] }
color-eyre = "=0.6.5"
colored = "=3.1.1"
config = "=0.15.22"
derive-new = "=0.7.0"
futures = "=0.3.32"
futures-util = "=0.3.32"
google-gmail1 = "=7.0.0"
grammers-client = "=0.9.0"
grammers-mtsender = "=0.9.0"
grammers-session = "=0.9.0"
grammers-tl-types = "=0.9.0"
hmac = "=0.13.0"
hyper = "=1.9.0"
hyper-rustls = "=0.27.9"
hyper-util = { version = "=0.1.20", features = ["client", "client-legacy", "http1"] }
imap = "=3.0.0-alpha.15"
jiff = { version = "=0.2.24", features = ["serde"] }
libsql = "=0.9.30"
miette = { version = "=7.6.0", features = ["fancy", "syntect-highlighter", "serde"] }
oauth1-request = "=0.6.1"
psm = "=0.1.31"
quick-xml = "=0.39.3"
rand = "=0.10.1"
regex = "=1.12.3"
reqwest = { version = "=0.13.3", features = ["json", "multipart", "query", "form"] }
rustls = { version = "=0.23.40", features = ["aws-lc-rs"] }
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.149"
sha1 = "=0.11.0"
tg = "=0.9.5"
tokio = { version = "=1.52.1", features = ["full"] }
tokio-tungstenite = { version = "=0.29.0", features = ["native-tls"] }
tracing = "=0.1.44"
tracing-appender = "=0.2.5"
tracing-subscriber = "=0.3.23"
v_exchanges = { version = "=0.18.0", default-features = false, features = ["binance"] }
v_utils = { version = "=2.15.41", features = ["xdg", "cli", "tracing"] } #ga: rm path
xdg = { version = "=3.0.0", features = ["serde"] }
yup-oauth2 = "=12.1.2"
#,}}}

[dev-dependencies]
insta = "=1.47.2"

[lints.clippy]
# Stable
float_cmp = "allow" # is bad for `==` direct comparisons, but `<` and `>` should be allowed
len_zero = "allow" # `.empty()` is O(1) but on &str only
undocumented_unsafe_blocks = "warn"
tabs_in_doc_comments = "allow"

# Questionable
# const fns, so actually more performant
get_first = "allow"
get_last_with_len = "allow"
#,}}}
